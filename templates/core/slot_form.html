{% extends "base.html" %}

{% block title %}Add availability — FlexTime{% endblock %}

{% block content %}
  <hgroup>
    <h1>Add availability</h1>
    <p>Pick a window of time when you're free.</p>
  </hgroup>

  <form method="post" novalidate>
    {% csrf_token %}

    {% if form.non_field_errors %}
      <article class="error">{{ form.non_field_errors }}</article>
    {% endif %}

    <label>
      Start
      {{ form.start }}
      {% for error in form.start.errors %}<small style="color:var(--pico-del-color)">{{ error }}</small>{% endfor %}
    </label>

    <label>
      End
      {{ form.end }}
      {% for error in form.end.errors %}<small style="color:var(--pico-del-color)">{{ error }}</small>{% endfor %}
    </label>

    <button type="submit">Add slot</button>
    <a href="{% url 'core:my_calendar' %}" role="button" class="secondary outline">Cancel</a>
  </form>

  <script>
    // Keep the "end" picker from going before the chosen "start".
    // (The server validates this too — this is just a nicer picker.)
    const startInput = document.getElementById('id_start');
    const endInput = document.getElementById('id_end');
    function syncEndMin() {
      if (startInput.value) {
        endInput.min = startInput.value;
        if (endInput.value && endInput.value < startInput.value) {
          endInput.value = startInput.value;
        }
      }
    }
    startInput.addEventListener('change', syncEndMin);
  </script>
{% endblock %}
